  {id:"hackers",name:"해커스",url:"paranhanul.net",tag:"💰 이벤트가",priceLabel:"9,700원*",priceNum:9700,total:"≈120만",credit:"ok",subjects:"best",enroll:"unknown",practicum:"limited",lms:"unknown",lmsLabel:"미확인",auto:"unknown",memo:"PC·모바일 100% 연동 → HTML5 가능성↑. 9,700원은 7과목↑ 결제+최대80% 할인 조건부(정가 더 높음). 간접실습 80h 대체.",priceNote:"★조건부 이벤트가 — 정가/취소조건 확인"},

  "재인증 팝업(생체/OTP/PIN) 없음",
  "IP 1인·동시재생 제한 없음",
];
function verdictOf(count, touched){
  if(!touched) return {key:"unknown",label:"자동화 ?",txt:"아직 체크 안 함"};
  if(count===6) return {key:"best",label:"✅ 자동화 가능",txt:"6/6 통과"};
  if(count>=3) return {key:"limited",label:"⚠️ 부분 가능",txt:count+"/6 — 조건부"};
  return {key:"no",label:"❌ 자동화 불가",txt:count+"/6 — 막힘"};
}
const font = {fontFamily:"Pretendard, -apple-system, BlinkMacSystemFont, system-ui, 'Apple SD Gothic Neo', sans-serif"};

function Chip(props){
  var s = ST[props.status]||ST.unknown;
  return (<span style={{display:"inline-flex",alignItems:"center",gap:5,fontSize:12,fontWeight:800,color:s.c,background:s.bg,border:"1.5px solid "+B.ink,borderRadius:999,padding:"3px 10px",whiteSpace:"nowrap"}}>

}

}
function Card(props){
  return <div style={Object.assign({background:B.card,border:"2px solid "+B.ink,borderRadius:14,boxShadow:B.shadow,padding:18},props.style)}>{props.children}</div>;
}

      <div style={{marginBottom:22}}>

        <h1 style={{fontSize:34,fontWeight:900,color:B.ink,margin:"14px 0 2px",lineHeight:1.05}}>최저가 × 자동화 가능</h1>

      </div>

      <div style={{background:B.ink,color:"#fdfcf7",border:"2px solid "+B.ink,borderRadius:14,boxShadow:B.shadow,padding:18,marginBottom:26}}>

          {[{e:"💸",t:"최저가",v:"배움 4.5만",d:"공개 고정가 최저·투명. 해커스 9,700원은 7과목↑ 조건부",s:"best"},
            {e:"🤖",t:"자동화",v:"전부 미확정",d:"F12 분석 필요. 중앙=iframe, 메가=IP출석 빡셈",s:"unknown"},

          {priceRank.map(function(s,i){var w=Math.max(8,(s.priceNum/150000)*100);var cheap=i===0;return(

        <Card>
          {[["cb.or.kr 학점원부 확인","선수학점 0 재확인 → 17과목 풀 확정 (확인됨)"],
            ["F12로 자동화 체크 (위 03 사용)","중앙(iframe)→메가(빡셈)→배움→해커스→Kstudy→유비온"],
