function Chip({status,text}) {
  const s = ST[status]||ST.unknown;

    color:s.c,background:s.bg,border:"1.5px solid "+B.ink,borderRadius:999,padding:"3px 10px",whiteSpace:"nowrap"}}>
    <span style={{width:8,height:8,borderRadius:999,background:s.dot}}/>{text||s.label}</span>;
}

  return <div style={{display:"flex",alignItems:"flex-end",gap:12,marginBottom:16}}>
    <span style={{fontFamily:"ui-monospace,Menlo,monospace",fontSize:28,fontWeight:900,color:B.ink,lineHeight:1,letterSpacing:-1}}>{no}</span>
    <div><div style={{fontSize:19,fontWeight:900,color:B.ink,lineHeight:1.1}}>{title}</div>
    {sub&&<div style={{fontSize:12.5,color:B.sub,fontWeight:600,marginTop:2}}>{sub}</div>}</div></div>;
}
function Card({children,style}) {
  return <div style={Object.assign({background:B.card,border:"2px solid "+B.ink,borderRadius:14,boxShadow:B.shadow,padding:16},style)}>{children}</div>;
}
function CleanlinessBar({listeners}) {

    <div style={{flex:1,height:16,background:"#efe9da",border:"1.5px solid "+B.ink,borderRadius:999,overflow:"hidden"}}>

    <span style={{fontSize:12.5,fontWeight:900,color:B.ink,minWidth:54,textAlign:"right"}}>{listeners===0?"0개 🏆":listeners+"개"}</span></div>;
}
