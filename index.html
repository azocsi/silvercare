<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>SilverCare Boards · 실버케어 도메인 허브</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net" />
<link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" rel="stylesheet" />
<script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  body { margin:0; font-family: Pretendard, -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background:#ede4d3;
    background-image: radial-gradient(#19151014 1.5px, transparent 1.5px);
    background-size: 26px 26px;
    color:#1c1917; }
  button, a { font-family: inherit; }
  a { text-decoration:none; color:inherit; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;

/* ── 팔레트 (silvercare 고정) ───────────────────────────── */
const B = { ink:"#1c1917", cream:"#fdfcf7", card:"#fffdf8", sub:"#78716c",
  shadow:"5px 5px 0 0 #1c1917", shadowSm:"3px 3px 0 0 #1c1917" };

/* ════════════════════════════════════════════════════════
   ★ 콘텐츠 트리 — 보드 추가는 여기만 건드리면 됨.
   - children 있으면 = 카테고리(드릴다운)
   - href 있으면 = 실제 보드(클릭 시 이동)
   - href "" + status:"soon" = 준비중(비활성)
   ════════════════════════════════════════════════════════ */
const TREE = [
  {
    id:"cert", emoji:"🎓", title:"자격증",
    desc:"실버케어 전문가가 되기 위한 자격 취득 전 과정 기록",
    tone:"#6fcf7c",
    children:[
      {
        id:"sw2", emoji:"🤲", title:"사회복지사 2급",
        desc:"비전공·석사 보유 상태에서 2급→1급 최단·최저가 취득 여정",
        tone:"#6fa8f5",
        children:[
          { id:"edu", emoji:"🏫", title:"교육원 선택 분석",
            desc:"6개 교육원을 F12로 직접 찍은 자동화 실측 비교", badge:"#001",
            href:"./analyze/" },
          { id:"eval", emoji:"📅", title:"S2 평가 캘린더",
            desc:"노인복지론+청소년복지론 15주 · 퀴즈·중간·기말 마감 추적", badge:"S2",
            href:"./boards/social-worker-2/eval-calendar/" },
          { id:"elderly", emoji:"📕", title:"노인복지론",
            desc:"노화의 이해 · 소득·건강·장기요양 · 인권·호스피스", badge:"준비중",
            status:"soon" },
          { id:"youth", emoji:"📘", title:"청소년복지론",
            desc:"청소년 발달 · 상담 · 비행·학교폭력 · 복지정책", badge:"준비중",
            status:"soon" },
        ]
      }
    ]
  },
  // ── 추후 대분류는 여기에 한 줄씩 추가 (예: 요양보호사, 실버 시장 인사이트) ──
];

/* ── 해시 라우팅 ─────────────────────────────────────────── */
const getPath = () => {
  const h = window.location.hash.replace(/^#\/?/, "");
  return h ? h.split("/").filter(Boolean) : [];
};
const findNode = (path) => {
  let nodes = TREE, node = null;
  for (const id of path) {
    node = (nodes || []).find(n => n.id === id);
    if (!node) return null;
    nodes = node.children;
  }
  return node;
};

const bru = (bg, sm) => ({ background:bg, border:`2px solid ${B.ink}`,
  borderRadius:12, boxShadow: sm ? B.shadowSm : B.shadow });

/* ── 카드 ────────────────────────────────────────────────── */
function Card({ node, onOpen }) {
  const soon = node.status === "soon" || (!node.children && !node.href);
  const hasKids = !!node.children;
  const go = () => {
    if (soon) return;
    if (hasKids) onOpen(node.id);
    else if (node.href) window.location.href = node.href;
  };
  return (
    <button onClick={go} disabled={soon}
      style={{ ...bru(B.card), padding:18, textAlign:"left", cursor: soon?"default":"pointer",
        opacity: soon?0.55:1, display:"flex", flexDirection:"column", gap:8,
        borderTopWidth: node.tone?6:2, borderTopColor: node.tone||B.ink,
        transition:"transform .12s, box-shadow .12s",
        ...(soon?{}:{}) }}
      onMouseEnter={e=>{ if(!soon){ e.currentTarget.style.transform="translate(-2px,-2px)"; e.currentTarget.style.boxShadow="7px 7px 0 0 #1c1917"; }}}
      onMouseLeave={e=>{ e.currentTarget.style.transform="none"; e.currentTarget.style.boxShadow=B.shadow; }}>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start" }}>
        <span style={{ fontSize:34, lineHeight:1 }}>{node.emoji}</span>
        {node.badge && <span style={{ fontSize:11.5, fontWeight:900, color:B.cream, background:B.ink,
          borderRadius:6, padding:"3px 8px", letterSpacing:0.5 }}>{node.badge}</span>}
      </div>
      <div style={{ fontSize:18, fontWeight:900, lineHeight:1.2 }}>{node.title}</div>
      {node.desc && <div style={{ fontSize:13, fontWeight:600, color:B.sub, lineHeight:1.5 }}>{node.desc}</div>}
      <div style={{ marginTop:"auto", paddingTop:8, fontSize:12.5, fontWeight:800,
        color: soon ? B.sub : B.ink }}>
        {soon ? "준비중 ⏳" : hasKids ? `${node.children.length}개 보기 →` : "열기 →"}
      </div>
    </button>
  );
}

function App() {
  const [path, setPath] = useState(getPath());
  useEffect(() => {
    const on = () => setPath(getPath());
    window.addEventListener("hashchange", on);
    return () => window.removeEventListener("hashchange", on);
  }, []);
  const nav = (newPath) => { window.location.hash = "#/" + newPath.join("/"); };
  const open = (id) => nav([...path, id]);

  const cur = path.length ? findNode(path) : null;
  const children = path.length ? (cur?.children || []) : TREE;

  // 브레드크럼 라벨
  const crumbs = [{ label:"🏠 홈", path:[] }];
  let acc = [];
  for (const id of path) { acc = [...acc, id]; const n = findNode(acc); if(n) crumbs.push({ label:`${n.emoji} ${n.title}`, path:acc }); }

  return (
    <div style={{ minHeight:"100vh", padding:"26px 16px 70px" }}>
      <div style={{ maxWidth:860, margin:"0 auto" }}>

        {/* 상단 바: 포트폴리오 복귀 */}
        <a href="https://hwanee.com" style={{ ...bru(B.card,true), display:"inline-block",
          padding:"7px 14px", fontSize:13, fontWeight:800, marginBottom:18 }}>← 포트폴리오</a>

        {/* 히어로 (홈에서만 크게) */}
        {path.length === 0 ? (
          <>
            <h1 style={{ fontSize:34, fontWeight:900, margin:"0 0 6px", lineHeight:1.05 }}>
              🤲 SilverCare <span style={{ background:"#6fcf7c", border:`2px solid ${B.ink}`,
                borderRadius:8, padding:"0 10px", boxShadow:B.shadowSm, display:"inline-block" }}>Boards</span>
            </h1>
            <p style={{ fontSize:14, fontWeight:600, color:B.sub, margin:"10px 0 18px", lineHeight:1.6 }}>
              실버케어 도메인 전문가가 되기 위한 자격·지식·시장 인사이트를 직접 쌓아 올린 기록.
              가설이 아니라 <b style={{ color:B.ink }}>직접 한 것</b>만 박제한다.
            </p>
            <div style={{ ...bru("#fef3c7"), padding:"12px 16px", marginBottom:26, fontSize:13, fontWeight:700 }}>
              ⚠️ 이 기록은 개인 취득·학습 여정이며, 특정 교육기관 추천이 아닙니다. 판단은 본인 몫.
            </div>
          </>
        ) : (
          <>
            {/* 브레드크럼 */}
            <div style={{ display:"flex", flexWrap:"wrap", alignItems:"center", gap:6, marginBottom:14, fontSize:13, fontWeight:800 }}>
              {crumbs.map((c,i) => (
                <span key={i} style={{ display:"inline-flex", alignItems:"center", gap:6 }}>
                  {i>0 && <span style={{ color:B.sub }}>/</span>}
                  <button onClick={()=>nav(c.path)} style={{ border:"none", background:"transparent",
                    cursor:"pointer", fontWeight: i===crumbs.length-1?900:700,
                    color: i===crumbs.length-1?B.ink:B.sub, padding:"2px 4px" }}>{c.label}</button>
                </span>
              ))}
            </div>
            {cur && <>
              <h1 style={{ fontSize:28, fontWeight:900, margin:"0 0 6px", lineHeight:1.15 }}>
                {cur.emoji} {cur.title}</h1>
              {cur.desc && <p style={{ fontSize:14, fontWeight:600, color:B.sub, margin:"0 0 22px", lineHeight:1.6 }}>{cur.desc}</p>}
            </>}
          </>
        )}

        {/* 카드 그리드 */}
        <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(240px,1fr))", gap:16 }}>
          {children.map(n => <Card key={n.id} node={n} onOpen={open} />)}
        </div>

        <div style={{ textAlign:"center", marginTop:40, fontSize:12, fontWeight:700, color:B.sub }}>
          🤲 made by 환희 — 배우면 만들고, 만들면 박제한다.
        </div>
      </div>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
