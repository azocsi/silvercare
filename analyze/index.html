function el(tag, attrs, children) {
  var n = document.createElement(tag);
  if (attrs) for (var k in attrs) {
    if (k === "class") n.className = attrs[k];
    else if (k === "style") n.style.cssText = attrs[k];
    else if (k === "html") n.innerHTML = attrs[k];
    else n.setAttribute(k, attrs[k]);
  }
  if (children) (Array.isArray(children)?children:[children]).forEach(function(c){
    if (c == null) return;
    n.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return n;
}

  c.appendChild(document.createTextNode(text || s.label));

}

  var s03 = el("div", { "class":"section" });
  s03.appendChild(secTitle("03", "진도저장 Payload", "ch4 자동화 셋업의 핵심"));
  var c03 = el("div", { "class":"card" });
  tested.forEach(function(s, i) {
    var row = el("div", { style:"padding:10px 0;"+(i<tested.length-1?"border-bottom:1.5px dashed #d6ccb5":"") });
    var top = el("div", { style:"display:flex;align-items:center;gap:8px;margin-bottom:5px" });
    top.appendChild(el("span", { style:"font-weight:900;font-size:13.5px;min-width:88px" }, s.name));
    top.appendChild(chip(s.hasPayload ? "best" : "unknown", s.hasPayload ? "✅ 평문 확인" : "❓ 미확인"));
    row.appendChild(top);
    row.appendChild(el("div", {
      style:"font-size:11.5px;font-weight:"+(s.hasPayload?"800":"600")+";color:"+(s.hasPayload?"#166534":"var(--sub)")+";font-family:"+(s.hasPayload?"ui-monospace,monospace":"inherit")+";line-height:1.5"
    }, s.progressPayload));
    c03.appendChild(row);
  });
  c03.appendChild(el("p", { "class":"note" },
    "※ 맛보기는 부모페이지 끊겨 Network 측정 불가(정상). 배움·중앙·메가는 정식 강의실 등록 후 Fetch/XHR 재확인 필요."));
  s03.appendChild(c03);
  app.appendChild(s03);

  // ─ 04 가격 랭킹 ─
  var s04 = el("div", { "class":"section" });
  s04.appendChild(secTitle("04", "실결제 가격 랭킹", "17과목 기준 (해커스 조건부·패스 2곳 제외)"));
  var c04 = el("div", { "class":"card" });
  var maxP = 882400;
  priceRank.forEach(function(s, i) {
    var w = Math.max(8, s.priceNum/maxP*100);
    var row = el("div", { "class":"price-row" });
    row.appendChild(el("span", { "class":"price-rank", style:"color:"+(i===0?"#047857":"var(--sub)") }, String(i+1)));
    row.appendChild(el("span", { "class":"price-name" }, s.name));
    var bar = el("div", { "class":"bar", style:"flex:1" });
    bar.appendChild(el("div", { style:"width:"+w+"%;background:"+(i===0?"#6ee7b7":"#fcd9a8") }));
    row.appendChild(bar);
    row.appendChild(el("span", { "class":"price-label" }, s.priceLabel));
    c04.appendChild(row);
  });
  c04.appendChild(el("p", { "class":"note" }, "※ 메가 86.7만은 여름초특가(6/24 마감). 중앙·메가 모두 상담 쿠폰 변수 있어 최종 결제 직전 재확인. 총비용에 실습세미나·실습기관비·행정비 별도."));
  s04.appendChild(c04);
  app.appendChild(s04);

  // ─ 05 교육원별 상세 ─
  var s05 = el("div", { "class":"section" });
  s05.appendChild(secTitle("05", "교육원별 상세", "탭을 누르면 펼쳐져요 · 실측 4 + 패스 2"));
  SITES.forEach(function(s) {
    var row = el("div", { "class":"site-row"+(openId===s.id?" open":"")+(s.passed?" passed":"") });
    var btn = el("button", { "class":"site-btn" });
    var arrow = el("span", { style:"font-size:14px;color:var(--sub);transition:transform .15s;"+(openId===s.id?"transform:rotate(90deg)":"") }, "▶");
    btn.appendChild(arrow);
    var nameEl = el("span", { "class":"site-name", style:s.passed?"text-decoration:line-through":""}, s.name);
    btn.appendChild(nameEl);
    btn.appendChild(el("span", { "class":"site-tag" }, s.tag));
    var chips = el("span", { "class":"site-chips" });
    if (!s.passed) chips.appendChild(chip("ok", "💸 "+s.priceLabel));
    chips.appendChild(chip(s.passed?"no":"limited", s.passed?"🚫 패스":s.tested?"⚠️ 부분":"미조사"));
    btn.appendChild(chips);
    btn.onclick = function() {
      openId = (openId===s.id) ? null : s.id;
      render();
    };
    row.appendChild(btn);
    if (openId === s.id) {
      var body = el("div", { "class":"site-body" });
      if (s.passed) {
        var pr = el("div", { "class":"pass-reason" });
        pr.appendChild(el("span", { "class":"pass-ico" }, "🚫"));
        var pd = el("div");
        pd.appendChild(el("div", { "class":"pass-title" }, "이번 선정에서 제외"));
        pd.appendChild(el("div", { "class":"memo-text", style:"color:var(--sub)" }, s.memo));
        pr.appendChild(pd);
        body.appendChild(pr);
      } else {
        var mg = el("div", { "class":"meta-grid" });
        [
          ["LMS", chip(s.lms, s.lmsLabel)],
          ["감지 리스너", el("span", { "class":"meta-val" }, s.listeners===null?"미측정":s.listeners===0?"0개 🏆":s.listeners+"개")],
          ["과목당", el("span", { "class":"meta-val" }, s.perSubject)],
          ["진도저장", chip(s.hasPayload?"best":"unknown", s.hasPayload?"평문 ✅":"미확인 ❓")],
        ].forEach(function(pair) {
          var b = el("div", { "class":"meta-box" });
          b.appendChild(el("div", { "class":"meta-label" }, pair[0]));
          b.appendChild(pair[1]);
          mg.appendChild(b);
        });
        body.appendChild(mg);
        if (s.highlight) body.appendChild(el("div", { "class":"highlight-box" }, s.highlight));
        var lb = el("div", { "class":"login-box" });
        lb.appendChild(el("div", { "class":"login-label" }, "🔐 로그인 장벽 (진짜 관문)"));
        lb.appendChild(el("div", { "class":"login-val" }, s.login));
        body.appendChild(lb);
        if (s.hasPayload) {
          body.appendChild(el("div", { "class":"payload-box" }, "진도저장: "+s.progressPayload));
        }
        body.appendChild(el("div", { "class":"memo-text" }, s.memo));
        body.appendChild(el("a", { "class":"ext-link", href:"https://"+s.url, target:"_blank" }, "🔗 "+s.url));
      }
      row.appendChild(body);
    }
    s05.appendChild(row);
  });
  app.appendChild(s05);

  // ─ 06 냉정한 한계점 ─
  var s06 = el("div", { "class":"section" });
  s06.appendChild(secTitle("06", "냉정한 한계점", "실측했어도 아직 모르는 것"));
  var lg = el("div", { "class":"limits-grid" });
  [
    { ic:"📊", t:"진도저장 3곳 미확인", d:"배움·중앙·메가는 맛보기 Network 측정 불가. 정식 등록 후 Fetch/XHR에서 확인해야 최종 ✅/❌. 해커스는 평문 확인됐으나 서버의 속도 검증 여부는 추가 확인 필요." },
    { ic:"🔐", t:"영상 깨끗 ≠ 자동화 가능", d:"메가 리스너 0개지만 IP+생체/OTP가 진짜 관문. 영상제어 청정도와 로그인 장벽은 별개 문제." },
    { ic:"⚠️", t:"배움 실측 불가 상태", d:"맛보기 소스 404로 영상 재생 안 됨. ratechange 17개가 실제 막는지 미확인. 정식 강의실 재검증 필수." },
    { ic:"⏰", t:"메가 6/24 마감 임박", d:"여름초특가 86.7만이 6/22 기준 이틀 남음. 실질 결정이 필요하다면 오늘 내일 안에." },
  ].forEach(function(x) {
    var c = el("div", { "class":"card limit-card" });
    c.appendChild(el("div", { "class":"limit-title" }, x.ic+" "+x.t));
    c.appendChild(el("div", { "class":"limit-body" }, x.d));
    lg.appendChild(c);
  });
  s06.appendChild(lg);
  app.appendChild(s06);

  // ─ 07 ch3 액션 플랜 ─
  var s07 = el("div", { "class":"section" });
  s07.appendChild(secTitle("07", "ch3로 넘어가기", "기관 확정 → 수강신청 전략"));
  var c07 = el("div", { "class":"card" });
  [
    ["메가 6/24 마감 전 의사결정", "가격·영상청정도 1위지만 IP출석 장벽. 오늘~내일 최종 결정"],
    ["중앙 or 메가 — 로그인 장벽 최종 확인", "중앙: ID/PW 로그인으로 수강까지 가능한지 / 메가: IP출석 구조 상세"],
    ["2026 2학기 8과목 신청 (시나리오 B)", "필수4 확보 → 실습을 2027 1학기로 당기는 핵심 타이밍"],
    ["ch4 자동화 셋업 준비", "해커스 진도저장 평문 실마리 + 선택 기관 정식 등록 후 Playwright 작성"],
    ["현장실습기관 미리 섭외", "welfare.net 등록기관, 주말·야간 가능처 2027 초부터 연락"],
  ].forEach(function(pair, i) {
    var r = el("div", { "class":"action-row" });
    r.appendChild(el("span", { "class":"action-num" }, String(i+1)));
    var d = el("div");
    d.appendChild(el("div", { "class":"action-t" }, pair[0]));
    d.appendChild(el("div", { "class":"action-d" }, pair[1]));
    r.appendChild(d);
    c07.appendChild(r);
  });
  s07.appendChild(c07);
  app.appendChild(s07);

  app.appendChild(el("footer", null, "🥈 사회복지사 2급 · S1 ch2 마무리 · F12 실측: 배움·중앙·메가·해커스 · Kstudy·유비온 패스 · 2026-06-22"));
}
render();
</script>
